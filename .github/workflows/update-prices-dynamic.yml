name: Update Prices (Dynamic System)

on:
  schedule:
    # De 4 em 4 horas, das 08:00 às 00:00 (Horário de Brasília)
    # BRT: 08, 12, 16, 20, 00
    # UTC: 11, 15, 19, 23, 03
    - cron: "0 3,11,15,19,23 * * *"

  workflow_dispatch:

jobs:
  update-prices-dynamic:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: update-prices-dynamic
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Update Amazon prices (Dynamic)
        run: npx tsx scripts/z-UpdatePrices.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          AMAZON_REGION: "us-east-1"
          AMAZON_HOST: "webservices.amazon.com.br"
          AMAZON_API_PROVIDER: "creators"
          AMAZON_DISABLE_PAAPI_FALLBACK: "1"
          AMAZON_CREATORS_CREDENTIAL_ID: ${{ secrets.AMAZON_CREATORS_CREDENTIAL_ID }}
          AMAZON_CREATORS_CREDENTIAL_SECRET: ${{ secrets.AMAZON_CREATORS_CREDENTIAL_SECRET }}
          AMAZON_CREATORS_VERSION: ${{ secrets.AMAZON_CREATORS_VERSION }}
